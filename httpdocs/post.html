<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>注册信息</title>
</head>

<body>

<h1>用户注册</h1>

<form action="/post.cgi" method="POST">

    账号：
    <input type="text"
           name="user"
           size="10"
           maxlength="20">

    <br><br>

    密码：
    <input type="password"
           name="password"
           size="10">

    <br><br>

    爱好：
    <input type="checkbox"
           name="hobby"
           value="sports">体育

    <input type="checkbox"
           name="hobby"
           value="singing">唱歌

    <br><br>

    性别：
    <input type="radio"
           name="sex"
           value="male"
           checked>男

    <input type="radio"
           name="sex"
           value="female">女

    <br><br>

    自我介绍：

    <br>

    <textarea name="introduction"
              cols="35"
              rows="8"></textarea>

    <br><br>

    地址：

    <select name="address">
        <option value="beijing">北京</option>
        <option value="sichuan">四川</option>
        <option value="shanghai">上海</option>
        <option value="wuhan">武汉</option>
    </select>

    <br><br>

    <input type="submit" value="提交">

    <input type="reset" value="重置">

</form>

</body>
</html>
